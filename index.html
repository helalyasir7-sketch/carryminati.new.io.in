<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarryMinati | Official Site</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-yellow: #ffcc00;
            --accent-red: #ff3c3c;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Impact', 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://yt3.googleusercontent.com/ytc/AIdro_n8-76M-G_G9pGv9z0Y-g-o') no-repeat center center/cover;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 5px solid var(--accent-yellow);
            box-shadow: 0 0 20px var(--accent-yellow);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--accent-yellow);
        }

        .tagline {
            font-size: 1.5rem;
            font-weight: 300;
            font-family: 'Courier New', monospace;
        }

        /* Content Sections */
        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            min-width: 150px;
            border-bottom: 4px solid var(--accent-red);
        }

        .stat-box h2 { color: var(--accent-red); margin: 0; }

        /* Social Icons */
        .social-links a {
            color: var(--text-white);
            font-size: 2rem;
            margin: 0 15px;
            text-decoration: none;
            transition: 0.3s;
        }

        .social-links a:hover { color: var(--accent-yellow); }

        .btn {
            background-color: var(--accent-red);
            color: white;
            padding: 15px 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <section class="hero">
        <img src="https://i.imgur.com/8QG9XhS.png" alt="CarryMinati Avatar" class="profile-pic">
        <h1>CARRYMINATI</h1>
        <p class="tagline">"Toh Kaise Hai Aap Log?"</p>
        <button class="btn" onclick="window.location.href='https://youtube.com/@CarryMinati'">Watch Latest Roast</button>
    </section>

    <section class="section">
        <h2>THE NUMBERS</h2>
        <div class="stats-container">
            <div class="stat-box">
                <h2>45.5M+</h2>
                <p>YouTube Subs</p>
            </div>
            <div class="stat-box">
                <h2>21M+</h2>
                <p>Instagram Fans</p>
            </div>
            <div class="stat-box">
                <h2>4.3B+</h2>
                <p>Total Views</p>
            </div>
        </div>
    </section>

    <section class="section" style="background: #111;">
        <h2>LATEST VENTURES</h2>
        <p>Gamer | Rapper | Roast King</p>
        <div class="social-links">
            <a href="#">YouTube</a>
            <a href="#">Instagram</a>
            <a href="#">X (Twitter)</a>
            <a href="#">Facebook</a>
        </div>
    </section>

    <footer style="padding: 20px; text-align: center; font-size: 0.8rem; color: #555;">
        © 2026 CarryMinati Productions Official. No logic, only entertainment.
    </footer>

</body>
</html>
